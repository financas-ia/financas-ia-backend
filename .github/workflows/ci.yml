name: Pipeline-financas-ia-backend

on:
  pull_request:
    branches: [staging]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies for vulnerabilities
        run: npm audit --audit-level=high

      - name: Run build
        run: npm run build

      - name: Run tests
        run: npm run test

